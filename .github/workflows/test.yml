name: Package kxsmb + Samba prebuilt libs

on:
  workflow_dispatch:
    inputs:
      samba_version:
        description: 'Choose prebuilt Samba version'
        required: true
        type: choice
        default: '4.0.26'
        options:
          - '4.0.26'       # 对应 samba_4.0.26_xcode12_macos11.01_20201213.7z
          - '20181123'     # 对应 SMB20181123.zip
      architecture:
        description: 'Target architecture (default arm64)'
        required: true
        type: choice
        default: 'arm64'
        options:
          - arm64
          - armv7

jobs:
  package:
    runs-on: macos-latest

    steps:
      - name: Install p7zip (for .7z extraction)
        run: brew install p7zip

      - name: Download prebuilt Samba libraries
        run: |
          mkdir -p samba_prebuilt
          cd samba_prebuilt

          if [ "${{ github.event.inputs.samba_version }}" = "4.0.26" ]; then
            echo "📥 Downloading Samba 4.0.26 (arm64 only)..."
            curl -L -o samba.7z "https://github.com/Geeeeeker/samba-iOS/releases/download/v1.0/samba_4.0.26_xcode12_macos11.01_20201213.7z"
            7z x samba.7z
            rm samba.7z
          else
            echo "📥 Downloading Samba 20181123 (includes armv7/arm64)..."
            curl -L -o samba.zip "https://github.com/Geeeeeker/samba-iOS/releases/download/v1.0/SMB20181123.zip"
            unzip -q samba.zip
            rm samba.zip
          fi

          # 清理 macOS 元数据
          find . -name ".DS_Store" -delete

      - name: Download kxsmb Objective-C wrapper files
        run: |
          mkdir -p kxsmb_wrapper
          cd kxsmb_wrapper

          echo "📥 Downloading kxsmb wrapper files..."
          curl -L -o KxSMBProvider.h "https://raw.githubusercontent.com/kolyvan/kxsmb/master/kxsmb/KxSMBProvider.h"
          curl -L -o KxSMBProvider.m "https://raw.githubusercontent.com/kolyvan/kxsmb/master/kxsmb/KxSMBProvider.m"
          curl -L -o KxSMBItem.h "https://raw.githubusercontent.com/kolyvan/kxsmb/master/kxsmb/KxSMBItem.h"
          curl -L -o KxSMBItem.m "https://raw.githubusercontent.com/kolyvan/kxsmb/master/kxsmb/KxSMBItem.m"

      - name: Organize final package
        run: |
          ARCH="${{ github.event.inputs.architecture }}"
          PACKAGE_DIR="kxsmb_samba_${ARCH}_${{ github.event.inputs.samba_version }}"
          mkdir -p "$PACKAGE_DIR/libs"
          mkdir -p "$PACKAGE_DIR/include"
          mkdir -p "$PACKAGE_DIR/wrapper"

          # 复制静态库（如果预编译包中有多架构目录，优先使用指定架构）
          if [ -d "samba_prebuilt/$ARCH" ]; then
            cp samba_prebuilt/$ARCH/*.a "$PACKAGE_DIR/libs/"
          else
            cp samba_prebuilt/*.a "$PACKAGE_DIR/libs/" 2>/dev/null || true
          fi

          # 复制头文件
          cp samba_prebuilt/*.h "$PACKAGE_DIR/include/" 2>/dev/null || true

          # 复制 kxsmb 封装文件
          cp kxsmb_wrapper/* "$PACKAGE_DIR/wrapper/"

          # 创建 README
          cat > "$PACKAGE_DIR/README.txt" << EOF
          ==============================================
          kxsmb + Samba Prebuilt for iOS
          ==============================================

          Version: Samba ${{ github.event.inputs.samba_version }}
          Architecture: $ARCH

          📁 Directory structure:
            libs/        - Static libraries (.a) and some headers
            include/     - Additional C headers for libsmbclient
            wrapper/     - kxsmb Objective-C wrapper files

          🛠 Integration steps:
          1. Drag the entire folder into your Xcode project.
          2. In Build Phases -> Link Binary With Libraries, add:
             - libresolv.tbd
             - libz.tbd
          3. In Build Settings, set "Header Search Paths" to:
             \$(PROJECT_DIR)/$PACKAGE_DIR/include
             \$(PROJECT_DIR)/$PACKAGE_DIR/libs
             (or use recursive search)
          4. Import and use:
             #import "KxSMBProvider.h"

          📦 Files included:
          $(ls -R "$PACKAGE_DIR")

          Generated by GitHub Actions on $(date)
          ==============================================
          EOF

          # 打包为 zip
          zip -r "${PACKAGE_DIR}.zip" "$PACKAGE_DIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kxsmb-samba-${{ github.event.inputs.architecture }}-${{ github.event.inputs.samba_version }}
          path: "*.zip"
          retention-days: 30
