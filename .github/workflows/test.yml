      - name: Build .deb package
        run: |
          mkdir -p deb/DEBIAN
          mkdir -p deb/usr/local/bin
          cp ios_bin/smbclient deb/usr/local/bin/
          cat > deb/DEBIAN/control << EOF
          Package: com.yourname.smbclient
          Name: smbclient for iOS
          Version: 4.0.26
          Architecture: iphoneos-arm
          Description: Samba smbclient command line tool
          Maintainer: Your Name
          Section: Networking
          EOF
          dpkg-deb -b deb smbclient-ios-arm64.deb

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: smbclient-ios-arm64-deb
          path: smbclient-ios-arm64.deb
