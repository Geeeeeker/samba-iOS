name: 编译 iOS Samba 静态库

on:
  workflow_dispatch:
    inputs:
      arch_armv7:
        description: '编译 armv7 架构（iOS 9.0 以下设备）'
        required: false
        type: boolean
        default: false
      arch_arm64:
        description: '编译 arm64 架构（默认开启，iOS 11+ 设备）'
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: macos-13    # 注意：正确写法是 macos-13，无后缀

    steps:
      - name: 检出 kxsmb 封装库
        uses: actions/checkout@v4
        with:
          repository: kolyvan/kxsmb
          path: kxsmb

      - name: 下载修复版 samba 源码（已替换 system() 调用）
        run: |
          cd kxsmb
          rm -rf samba
          git clone https://github.com/shaojiankui/samba-iOS.git samba
          # 移除原有 .git 避免干扰
          rm -rf samba/.git

      - name: 设置 Xcode 环境
        run: |
          sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: 安装 autoconf / automake / libtool（若缺失）
        run: |
          brew install autoconf automake libtool

      - name: 解决 Xcode 缺失 crt_externs.h（仅模拟器 SDK 需要）
        run: |
          SIM_SDK_PATH="/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/iPhoneSimulator.sdk"
          if [ -d "$SIM_SDK_PATH" ]; then
            sudo mkdir -p "$SIM_SDK_PATH/usr/include"
            sudo tee "$SIM_SDK_PATH/usr/include/crt_externs.h" > /dev/null << 'EOF'
          #include <sys/cdefs.h>
          __BEGIN_DECLS
          extern char ***_NSGetArgv(void);
          extern int *_NSGetArgc(void);
          extern char ***_NSGetEnviron(void);
          extern char **_NSGetProgname(void);
          #ifdef __LP64__
          extern struct mach_header_64 *
          #else
          extern struct mach_header *
          #endif
          				_NSGetMachExecuteHeader(void);
          __END_DECLS
          EOF
          fi

      - name: 设置交叉编译环境变量（解决 big endian 等配置错误）
        run: |
          export samba_cv_big_endian=no
          export samba_cv_little_endian=yes
          export samba_cv_CC_NEGATIVE_ENUM_VALUES=yes
          export libreplace_cv_HAVE_GETADDRINFO=no
          export samba_cv_HAVE_WRFILE_KEYTAB=no
          export smb_krb5_cv_enctype_to_string_takes_krb5_context_arg=no
          export smb_krb5_cv_enctype_to_string_takes_size_t_arg=yes
          export ac_cv_file__proc_sys_kernel_core_pattern=yes
          
          # 构建架构列表
          ARCHS=""
          if [ "${{ github.event.inputs.arch_armv7 }}" = "true" ]; then
            ARCHS="$ARCHS armv7"
          fi
          if [ "${{ github.event.inputs.arch_arm64 }}" = "true" ]; then
            ARCHS="$ARCHS arm64"
          fi
          if [ -z "$ARCHS" ]; then
            ARCHS="arm64"
          fi
          
          cd kxsmb
          echo "🔨 开始编译架构: $ARCHS"
          rake build ARCHS="$ARCHS"

      - name: 打包编译产物
        run: |
          cd kxsmb
          mkdir -p artifacts/libs
          mkdir -p artifacts/include
          
          # 复制通用库（如果存在）或单架构库
          if [ -f "samba/source3/bin/universal/libsmbclient.a" ]; then
            cp samba/source3/bin/universal/*.a artifacts/libs/
          else
            # 尝试复制第一个存在的架构库
            for arch in arm64 armv7; do
              if [ -f "samba/source3/bin/${arch}/libsmbclient.a" ]; then
                cp samba/source3/bin/${arch}/*.a artifacts/libs/
                break
              fi
            done
          fi
          
          # 复制头文件
          cp samba/source3/include/libsmbclient.h artifacts/include/ 2>/dev/null || true
          cp samba/source3/include/smb_share_mode.h artifacts/include/ 2>/dev/null || true
          
          # 创建说明文件
          echo "Samba Source: https://github.com/shaojiankui/samba-iOS" > artifacts/README.txt
          echo "Architectures: ${{ github.event.inputs.arch_arm64 == 'true' && 'arm64' || '' }} ${{ github.event.inputs.arch_armv7 == 'true' && 'armv7' || '' }}" >> artifacts/README.txt
          echo "Build Date: $(date)" >> artifacts/README.txt
          
          cd artifacts
          zip -r ../samba-ios-libs.zip .

      - name: 上传最终产物
        uses: actions/upload-artifact@v4
        with:
          name: samba-ios-static-libs
          path: kxsmb/samba-ios-libs.zip
          retention-days: 30
