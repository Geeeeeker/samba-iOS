name: Build iOS Samba (arm64/armv7) - Robust

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Target architecture'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - armv7

jobs:
  build:
    runs-on: macos-latest
    env:
      # 交叉编译环境变量，解决 "cannot run test program" 等错误
      samba_cv_big_endian: no
      samba_cv_little_endian: yes
      samba_cv_CC_NEGATIVE_ENUM_VALUES: yes
      libreplace_cv_HAVE_GETADDRINFO: no
      samba_cv_HAVE_WRFILE_KEYTAB: no
      smb_krb5_cv_enctype_to_string_takes_krb5_context_arg: no
      smb_krb5_cv_enctype_to_string_takes_size_t_arg: yes
      ac_cv_file__proc_sys_kernel_core_pattern: yes
      # 附加编译选项（如需静态链接、禁用共享库等）
      CFLAGS: -D__IPHONE_OS_VERSION_MIN_REQUIRED=__IPHONE_11_0
      LDFLAGS: -Wl,-dead_strip

    steps:
      - name: Checkout kxsmb
        uses: actions/checkout@v4
        with:
          repository: kolyvan/kxsmb
          path: kxsmb

      - name: Clone iOS-patched Samba source (system() fixed)
        run: |
          cd kxsmb
          rm -rf samba
          git clone https://github.com/shaojiankui/samba-iOS.git samba
          rm -rf samba/.git

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7'

      - name: Install dependencies
        run: |
          gem install rake
          brew install autoconf automake libtool

      - name: Fix missing crt_externs.h (Simulator SDK)
        run: |
          SIM_INC="/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/iPhoneSimulator.sdk/usr/include"
          sudo mkdir -p "$SIM_INC"
          sudo tee "$SIM_INC/crt_externs.h" > /dev/null << 'EOF'
          #include <sys/cdefs.h>
          __BEGIN_DECLS
          extern char ***_NSGetArgv(void);
          extern int *_NSGetArgc(void);
          extern char ***_NSGetEnviron(void);
          extern char **_NSGetProgname(void);
          #ifdef __LP64__
          extern struct mach_header_64 *
          #else
          extern struct mach_header *
          #endif
          				_NSGetMachExecuteHeader(void);
          __END_DECLS
          EOF

      - name: Prevent Rakefile from regenerating configure
        run: |
          cd kxsmb
          # 注释掉 buildArch 函数内的 autoconf 调用，避免重新生成 configure
          sed -i '' '/system_or_exit("autoconf"/s/^/# DISABLED: /' Rakefile
          echo "=== autoconf lines in Rakefile ==="
          grep -n "autoconf" Rakefile || echo "(none found)"

      - name: Build for ${{ github.event.inputs.architecture }}
        run: |
          cd kxsmb
          echo "🔨 Building ${{ github.event.inputs.architecture }}"
          # 直接执行对应架构的 rake 任务
          rake build_smb_${{ github.event.inputs.architecture }}

      - name: Collect artifacts
        run: |
          cd kxsmb
          mkdir -p artifacts/libs
          ARCH="${{ github.event.inputs.architecture }}"
          # 复制生成的静态库（优先对应架构目录，其次通用目录）
          if [ -d "samba/source3/bin/${ARCH}" ]; then
            cp samba/source3/bin/${ARCH}/*.a artifacts/libs/
          elif [ -d "samba/source3/bin/universal" ]; then
            cp samba/source3/bin/universal/*.a artifacts/libs/
          else
            find samba/source3/bin -name "*.a" -exec cp {} artifacts/libs/ \;
          fi
          # 复制头文件
          cp samba/source3/include/*.h artifacts/libs/ 2>/dev/null || true
          # 生成说明文件
          echo "Architecture: ${ARCH}" > artifacts/build_info.txt
          echo "Date: $(date)" >> artifacts/build_info.txt
          # 打包
          tar -czf samba-ios-${ARCH}.tar.gz -C artifacts .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: samba-ios-${{ github.event.inputs.architecture }}
          path: kxsmb/samba-ios-*.tar.gz
          retention-days: 30
