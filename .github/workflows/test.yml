name: Build iOS Samba Static Library (arm64/armv7)

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Target Architecture'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - armv7

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout kxsmb repository
        uses: actions/checkout@v4
        with:
          repository: kolyvan/kxsmb
          path: kxsmb

      - name: Download iOS-patched Samba source
        run: |
          cd kxsmb
          rm -rf samba
          git clone https://github.com/shaojiankui/samba-iOS.git samba
          rm -rf samba/.git

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7'

      - name: Install build dependencies
        run: |
          gem install rake
          brew install autoconf automake libtool

      - name: Fix missing crt_externs.h for iOS Simulator SDK
        run: |
          SIM_SDK_PATH="/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/iPhoneSimulator.sdk"
          if [ -d "$SIM_SDK_PATH" ]; then
            sudo mkdir -p "$SIM_SDK_PATH/usr/include"
            sudo tee "$SIM_SDK_PATH/usr/include/crt_externs.h" > /dev/null << 'EOF'
          #include <sys/cdefs.h>
          __BEGIN_DECLS
          extern char ***_NSGetArgv(void);
          extern int *_NSGetArgc(void);
          extern char ***_NSGetEnviron(void);
          extern char **_NSGetProgname(void);
          #ifdef __LP64__
          extern struct mach_header_64 *
          #else
          extern struct mach_header *
          #endif
          				_NSGetMachExecuteHeader(void);
          __END_DECLS
          EOF
            echo "✅ crt_externs.h created"
          else
            echo "⚠️ Simulator SDK not found, skipping"
          fi

      - name: Set cross-compilation environment variables
        run: |
          export samba_cv_big_endian=no
          export samba_cv_little_endian=yes
          export samba_cv_CC_NEGATIVE_ENUM_VALUES=yes
          export libreplace_cv_HAVE_GETADDRINFO=no
          export samba_cv_HAVE_WRFILE_KEYTAB=no
          export smb_krb5_cv_enctype_to_string_takes_krb5_context_arg=no
          export smb_krb5_cv_enctype_to_string_takes_size_t_arg=yes
          export ac_cv_file__proc_sys_kernel_core_pattern=yes
          
          # 写入环境变量供后续步骤使用
          echo "samba_cv_big_endian=no" >> $GITHUB_ENV
          echo "samba_cv_little_endian=yes" >> $GITHUB_ENV
          echo "samba_cv_CC_NEGATIVE_ENUM_VALUES=yes" >> $GITHUB_ENV
          echo "libreplace_cv_HAVE_GETADDRINFO=no" >> $GITHUB_ENV
          echo "samba_cv_HAVE_WRFILE_KEYTAB=no" >> $GITHUB_ENV
          echo "smb_krb5_cv_enctype_to_string_takes_krb5_context_arg=no" >> $GITHUB_ENV
          echo "smb_krb5_cv_enctype_to_string_takes_size_t_arg=yes" >> $GITHUB_ENV
          echo "ac_cv_file__proc_sys_kernel_core_pattern=yes" >> $GITHUB_ENV
        shell: bash

      - name: Build Samba for ${{ github.event.inputs.architecture }}
        run: |
          cd kxsmb
          echo "🔨 Building for ${{ github.event.inputs.architecture }}"
          # 直接调用对应架构的 rake 任务（无需修改 Rakefile）
          rake build_smb_${{ github.event.inputs.architecture }}

      - name: Collect and package artifacts
        run: |
          cd kxsmb
          mkdir -p artifacts/libs
          
          # 复制编译生成的静态库
          if [ -d "samba/source3/bin/${{ github.event.inputs.architecture }}" ]; then
            cp samba/source3/bin/${{ github.event.inputs.architecture }}/*.a artifacts/libs/
          elif [ -d "samba/source3/bin/universal" ]; then
            cp samba/source3/bin/universal/*.a artifacts/libs/
          else
            echo "⚠️ No binary directory found, searching..."
            find samba/source3/bin -name "*.a" -exec cp {} artifacts/libs/ \;
          fi
          
          # 复制头文件（如果存在）
          if [ -d "libs" ]; then
            cp libs/*.h artifacts/libs/ 2>/dev/null || true
          fi
          
          # 创建版本信息
          echo "Architecture: ${{ github.event.inputs.architecture }}" > artifacts/build_info.txt
          echo "Build date: $(date)" >> artifacts/build_info.txt
          
          # 打包
          tar -czf samba-ios-${{ github.event.inputs.architecture }}.tar.gz -C artifacts .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: samba-ios-${{ github.event.inputs.architecture }}
          path: kxsmb/samba-ios-${{ github.event.inputs.architecture }}.tar.gz
          retention-days: 30
