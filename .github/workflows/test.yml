name: Build iOS Samba (Official Source + Patch)

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Target Architecture'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - armv7

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Install dependencies
        run: |
          brew install autoconf automake libtool

      - name: Download official Samba 4.0.26 source
        run: |
          curl -LO https://download.samba.org/pub/samba/stable/samba-4.0.26.tar.gz
          tar -xzf samba-4.0.26.tar.gz
          mv samba-4.0.26 samba

      - name: Apply iOS fixes (system() -> popen())
        run: |
          cd samba
          # 替换所有 system(cmd) 为 popen(cmd, "r")
          find . -name "*.c" -exec sed -i '' 's/system(\([^)]*\))/popen(\1, "r")/g' {} \;
          # 确保 popen 对应的 pclose 正确使用（如有必要）
          echo "Patch applied."

      - name: Set up cross-compilation environment
        run: |
          # 设置 SDK 路径和目标三元组
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          if [ "${{ github.event.inputs.architecture }}" = "arm64" ]; then
            HOST="aarch64-apple-darwin"
            ARCH_FLAGS="-arch arm64 -miphoneos-version-min=11.0"
          else
            HOST="armv7-apple-darwin"
            ARCH_FLAGS="-arch armv7 -miphoneos-version-min=9.0"
          fi

          export CC="$(xcrun --find clang)"
          export CXX="$(xcrun --find clang++)"
          export CFLAGS="-isysroot $SDK $ARCH_FLAGS"
          export LDFLAGS="-isysroot $SDK $ARCH_FLAGS"

          # 交叉编译预设变量
          export samba_cv_big_endian=no
          export samba_cv_little_endian=yes
          export samba_cv_CC_NEGATIVE_ENUM_VALUES=yes
          export libreplace_cv_HAVE_GETADDRINFO=no
          export samba_cv_HAVE_WRFILE_KEYTAB=no
          export smb_krb5_cv_enctype_to_string_takes_krb5_context_arg=no
          export smb_krb5_cv_enctype_to_string_takes_size_t_arg=yes
          export ac_cv_file__proc_sys_kernel_core_pattern=yes

          # 写入 GITHUB_ENV 供后续步骤使用
          echo "SDK=$SDK" >> $GITHUB_ENV
          echo "HOST=$HOST" >> $GITHUB_ENV
          echo "ARCH_FLAGS=$ARCH_FLAGS" >> $GITHUB_ENV
          echo "CC=$CC" >> $GITHUB_ENV
          echo "CXX=$CXX" >> $GITHUB_ENV
          echo "CFLAGS=$CFLAGS" >> $GITHUB_ENV
          echo "LDFLAGS=$LDFLAGS" >> $GITHUB_ENV
          echo "samba_cv_big_endian=no" >> $GITHUB_ENV
          echo "samba_cv_little_endian=yes" >> $GITHUB_ENV
          echo "samba_cv_CC_NEGATIVE_ENUM_VALUES=yes" >> $GITHUB_ENV
          echo "libreplace_cv_HAVE_GETADDRINFO=no" >> $GITHUB_ENV
          echo "samba_cv_HAVE_WRFILE_KEYTAB=no" >> $GITHUB_ENV
          echo "smb_krb5_cv_enctype_to_string_takes_krb5_context_arg=no" >> $GITHUB_ENV
          echo "smb_krb5_cv_enctype_to_string_takes_size_t_arg=yes" >> $GITHUB_ENV
          echo "ac_cv_file__proc_sys_kernel_core_pattern=yes" >> $GITHUB_ENV

      - name: Configure Samba
        run: |
          cd samba
          ./configure \
            --host=$HOST \
            --target=$HOST \
            --disable-shared \
            --enable-static \
            --disable-cups \
            --disable-iprint \
            --disable-pie \
            --without-pam \
            --without-winbind \
            --without-ads \
            --without-ldap \
            --without-acl-support \
            --without-utmp \
            --without-sendfile-support \
            --without-dnsupdate \
            --without-automount \
            --without-systemd \
            --without-dmapi \
            --without-fam \
            --without-gpgme \
            --without-json \
            --without-lttng \
            --without-ntdb \
            --without-regedit \
            --without-aio-support \
            --without-quotas \
            --without-syslog \
            --prefix=$(pwd)/install

      - name: Build libsmbclient
        run: |
          cd samba/source3
          make libsmbclient

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/libs
          cd samba
          # 收集生成的 .a 文件
          find . -name "*.a" -exec cp {} ../artifacts/libs/ \;
          # 复制头文件
          cp source3/include/libsmbclient.h ../artifacts/libs/
          cp source3/include/smb_share_mode.h ../artifacts/libs/ 2>/dev/null || true
          # 打包
          cd ../artifacts
          tar -czf ../samba-ios-${{ github.event.inputs.architecture }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: samba-ios-${{ github.event.inputs.architecture }}
          path: samba-ios-${{ github.event.inputs.architecture }}.tar.gz
          retention-days: 30
